# ← **SỬA 1**: Bỏ version (deprecated)

services:
  nginx:
    image: nginx:alpine
    ports:
      - "79:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app-network
      
  backend:
    build:
      context: ./backend_superset
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend_superset/.env
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3022:3022"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
