# ← **SỬA 1**: Bỏ version (deprecated)

services:
  backend:
    build:
      context: ./backend_superset
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend_superset/.env
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
